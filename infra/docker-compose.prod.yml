# jboard — stack de PRODUÇÃO (VPS Hostinger KVM2, atrás do Cloudflare Tunnel).
#
# Diferenças vs docker-compose.yml (dev):
#  - Nenhum serviço expõe porta direto na internet. Só o `web` (Caddy) abre uma
#    porta, e mesmo assim no loopback (127.0.0.1:8084) — só o cloudflared, que
#    roda na própria VPS, a alcança. Postgres/Redis/backend/evolution ficam
#    acessíveis apenas pela rede interna do compose.
#  - Segredos vêm do infra/.env (não há defaults inseguros tipo "jboard").
#  - `web` builda o Vue e serve o SPA + proxy /api na mesma origem (Caddy).
#
# Deploy: cloudflared roteia jboard.devarthur.com.br -> http://localhost:8084.
# Subir:  docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
#
# Mapa de portas da VPS (ver dev-notes/deploy-kvm2-hostinger-cloudflared):
# 5678 n8n · 8080 Evolution(antiga) · 8081 jpad · 8082/8443 jblog · 8084 jboard.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jboard
      POSTGRES_PASSWORD: ${JBOARD_DB_PASSWORD:?defina JBOARD_DB_PASSWORD no infra/.env}
      POSTGRES_DB: jboard
    volumes:
      - jboard_pgdata:/var/lib/postgresql/data
      # Cria a database "evolution" no mesmo Postgres na primeira subida.
      - ./init-evolution-db.sql:/docker-entrypoint-initdb.d/init-evolution-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jboard"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - jboard_redis:/data
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      JBOARD_DB_HOST: postgres
      JBOARD_DB_PASSWORD: ${JBOARD_DB_PASSWORD:?defina JBOARD_DB_PASSWORD no infra/.env}
      JBOARD_EVOLUTION_URL: http://evolution-api:8080
      JBOARD_EVOLUTION_INSTANCE: ${JBOARD_EVOLUTION_INSTANCE:-jboard}
      JBOARD_EVOLUTION_API_KEY: ${JBOARD_EVOLUTION_API_KEY:?defina JBOARD_EVOLUTION_API_KEY no infra/.env}
      JBOARD_WHATSAPP_RECIPIENT: ${JBOARD_WHATSAPP_RECIPIENT:-}
      # Em produção o token NÃO pode ser vazio (vazio = auth desligada).
      JBOARD_API_TOKEN: ${JBOARD_API_TOKEN:?defina JBOARD_API_TOKEN no infra/.env}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        # Mesmo token do backend: o SPA o envia em Authorization: Bearer.
        VITE_JBOARD_API_TOKEN: ${JBOARD_API_TOKEN:?defina JBOARD_API_TOKEN no infra/.env}
    ports:
      # Loopback só: o cloudflared (na VPS) alcança; a internet não.
      - "127.0.0.1:8084:80"
    depends_on:
      - backend
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:latest
    environment:
      # URL pública só importa pra links de mídia/webhook; o jboard só manda
      # texto. Apontada pro loopback de setup (QR). Ajuste se rotear um subdomínio.
      SERVER_URL: http://localhost:8085
      PORT: "8080"
      AUTHENTICATION_API_KEY: ${JBOARD_EVOLUTION_API_KEY:?defina JBOARD_EVOLUTION_API_KEY no infra/.env}
      LANGUAGE: pt-BR
      DEL_INSTANCE: "false"
      CONFIG_SESSION_PHONE_CLIENT: jboard
      CONFIG_SESSION_PHONE_NAME: Chrome
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://jboard:${JBOARD_DB_PASSWORD}@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "false"
      DATABASE_SAVE_MESSAGE_UPDATE: "false"
      DATABASE_SAVE_DATA_CONTACTS: "false"
      DATABASE_SAVE_DATA_CHATS: "false"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "false"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
    volumes:
      - jboard_evolution_instances:/evolution/instances
    ports:
      # Loopback só, e só pra setup (criar instância + escanear QR via SSH tunnel
      # ou na própria VPS). Pode remover após conectar o WhatsApp.
      - "127.0.0.1:8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  jboard_pgdata:
  jboard_redis:
  jboard_evolution_instances:
