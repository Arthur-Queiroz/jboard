# jboard — stack de PRODUÇÃO (VPS Hostinger KVM2, atrás do Cloudflare Tunnel).
#
# Diferenças vs docker-compose.yml (dev):
#  - Nenhum serviço expõe porta direto na internet. Só o `web` (Caddy) abre uma
#    porta, e mesmo assim no loopback (127.0.0.1:8084) — só o cloudflared, que
#    roda na própria VPS, a alcança. Postgres e backend só na rede interna.
#  - Segredos vêm do infra/.env (não há defaults inseguros tipo "jboard").
#  - `web` builda o Vue e serve o SPA + proxy /api na mesma origem (Caddy).
#  - WhatsApp: NÃO sobe Evolution dedicada. Reusa a Evolution compartilhada da
#    VPS (instância `inspire`, já conectada ao número do dono), alcançada pela
#    rede externa `n8n_inspiro_net`. A Evolution é só um gateway — não guarda
#    dado do jboard —, então compartilhá-la não acopla nada de negócio.
#
# Deploy: cloudflared roteia jboard.devarthur.com.br -> http://localhost:8084.
# Subir:  docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
#
# Mapa de portas da VPS (ver dev-notes/deploy-kvm2-hostinger-cloudflared):
# 5678 n8n · 8080 Evolution(compartilhada) · 8081 jpad · 8082/8443 jblog ·
# 8083 jinitializr · 8084 jboard.

# Nome do projeto (containers/volumes jboard_*), seguindo a convenção da VPS —
# senão o Compose usaria o nome do diretório ("infra").
name: jboard

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jboard
      POSTGRES_PASSWORD: ${JBOARD_DB_PASSWORD:?defina JBOARD_DB_PASSWORD no infra/.env}
      POSTGRES_DB: jboard
    volumes:
      - jboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jboard"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      JBOARD_DB_HOST: postgres
      JBOARD_DB_PASSWORD: ${JBOARD_DB_PASSWORD:?defina JBOARD_DB_PASSWORD no infra/.env}
      # Evolution COMPARTILHADA: alcançada pelo nome do container na rede
      # externa n8n_inspiro_net. INSTANCE/API_KEY vêm da Evolution compartilhada.
      JBOARD_EVOLUTION_URL: http://evolution-api:8080
      JBOARD_EVOLUTION_INSTANCE: ${JBOARD_EVOLUTION_INSTANCE:-inspire}
      JBOARD_EVOLUTION_API_KEY: ${JBOARD_EVOLUTION_API_KEY:?defina JBOARD_EVOLUTION_API_KEY no infra/.env}
      JBOARD_WHATSAPP_RECIPIENT: ${JBOARD_WHATSAPP_RECIPIENT:-}
      # Em produção o token NÃO pode ser vazio (vazio = auth desligada). É o
      # Bearer do desktop e a chave que assina o cookie de sessão da web.
      JBOARD_API_TOKEN: ${JBOARD_API_TOKEN:?defina JBOARD_API_TOKEN no infra/.env}
      # Senha do login da web (cookie de sessão). Obrigatória em prod, senão a
      # web fica sem como autenticar (o token saiu do bundle).
      JBOARD_AUTH_PASSWORD: ${JBOARD_AUTH_PASSWORD:?defina JBOARD_AUTH_PASSWORD no infra/.env}
    networks:
      - default
      - evolution
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      # Sem VITE_JBOARD_API_TOKEN: o SPA NÃO embute token (autentica por cookie
      # de sessão via /api/login). Isso fecha a lacuna do token exposto no bundle.
    ports:
      # Loopback só: o cloudflared (na VPS) alcança; a internet não.
      - "127.0.0.1:8084:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
  # Rede da stack n8n/Evolution compartilhada (criada por /root/n8n). O backend
  # entra nela pra falar com `evolution-api:8080` sem sair pra internet.
  evolution:
    name: n8n_inspiro_net
    external: true

volumes:
  jboard_pgdata:
