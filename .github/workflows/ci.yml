name: CI & Deploy

# Checks em todo PR e push; deploy só em push na main, depois de tudo passar.
# Método: SSH na VPS via Cloudflare Tunnel (o IP é filtrado pelos runners) +
# git reset --hard origin/main + docker compose up -d --build (build na VPS).
# Ver dev-notes/playbook-cicd-compose-cloudflare-tunnel.

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "arquivos não formatados:"; gofmt -l .; exit 1; }
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...   # testcontainers usa o Docker do runner (integração de DB)

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build   # vue-tsc (typecheck) + vite build

  # Sanity dos Dockerfiles ANTES de deployar (o build real é na VPS). As envs são
  # dummy só pra satisfazer os ${VAR:?} do compose no parse — não vão pra imagem.
  build:
    runs-on: ubuntu-latest
    env:
      JBOARD_DB_PASSWORD: ci
      JBOARD_EVOLUTION_API_KEY: ci
      JBOARD_API_TOKEN: ci
    steps:
      - uses: actions/checkout@v7
      - run: docker compose -f infra/docker-compose.prod.yml build

  deploy:
    needs: [ backend, frontend, build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Instala cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          sudo install -m 0755 "$RUNNER_TEMP/cloudflared" /usr/local/bin/cloudflared
      - name: Configura SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host vps
            HostName 2.25.158.85
            User root
            ProxyCommand cloudflared access ssh --hostname ssh.devarthur.com.br
            StrictHostKeyChecking accept-new
          EOF
      - name: Deploy na VPS
        run: |
          ssh vps '
            set -e
            cd /opt/jboard
            git fetch --all
            git reset --hard origin/main
            docker compose -f infra/docker-compose.prod.yml --env-file infra/.env up -d --build
            docker compose -f infra/docker-compose.prod.yml ps
          '
